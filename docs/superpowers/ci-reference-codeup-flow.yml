# =============================================================================
# REFERENCE ONLY — NOT ACTIVE
# =============================================================================
# This file is NOT picked up by Codeup. Codeup (代码托管) does not auto-detect
# repo-level CI files. CI/CD on Codeup requires 云效 Flow (a separate Aliyun
# product at flow.aliyun.com).
#
# Sprint 2 outcome: Codeup CI auto-trigger is deferred. Releases are done
# MANUALLY by the maintainer running `pnpm version-packages` + `pnpm release`
# locally. See RELEASING.md for the manual flow.
#
# This file is kept as a reference for when an admin enables Flow for this
# repo (Sprint 3+). The logic of the three stages (test / version-packages /
# release) maps directly to Flow jobs; only the YAML schema needs adaptation
# to whatever Flow expects.
#
# Original assumptions (kept here for context):
# - Syntax mimicked GitLab CI (rules:if, $CI_COMMIT_BRANCH, etc.)
# - Required CI_BOT_TOKEN secret (managed in Flow secrets, not Codeup)

stages:
  - test
  - version-packages
  - release

variables:
  PNPM_VERSION: '9'
  NODE_VERSION: '20'

# ---------------------------------------------------------------------------
# Stage 1: test — runs on every PR and every push to main
# ---------------------------------------------------------------------------
test:
  stage: test
  image: node:20
  before_script:
    - npm install -g pnpm@$PNPM_VERSION
    - pnpm install --frozen-lockfile
  script:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    # Lockfile drift guard — fail if .locked.json out of date
    - pnpm lock
    - |
      if ! git diff --exit-code .locked.json; then
        echo "::error::.locked.json is out of date. Run \`pnpm lock\` locally and commit."
        exit 1
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------------------------
# Stage 2: version-packages
# Runs when main has new commits with changesets. Accumulates them into a
# version bump + CHANGELOG write, commits with [skip ci] and pushes back.
# Skipped when last commit was already a [skip ci] commit (avoids recursion).
# ---------------------------------------------------------------------------
version-packages:
  stage: version-packages
  image: node:20
  before_script:
    - npm install -g pnpm@$PNPM_VERSION
    - pnpm install --frozen-lockfile
    - git config user.email "${CI_BOT_EMAIL:-ci-bot@foodmax.local}"
    - git config user.name "${CI_BOT_NAME:-FoodMax CI Bot}"
    # Rewrite origin to use the bot token for push access.
    - git remote set-url origin "https://oauth2:${CI_BOT_TOKEN}@bgs2026-ap-southeast-1.devops.alibabacloudcs.com/codeup/kos/dev-tools/foodmax-ai-config-init.git"
  script:
    - pnpm version-packages
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE !~ /\[skip ci\]/'

# ---------------------------------------------------------------------------
# Stage 3: release
# Runs when main has a "chore(release): version packages" commit. Tags,
# pushes the tag, updates versions.json, commits + pushes versions.json.
# ---------------------------------------------------------------------------
release:
  stage: release
  image: node:20
  before_script:
    - npm install -g pnpm@$PNPM_VERSION
    - pnpm install --frozen-lockfile
    - git config user.email "${CI_BOT_EMAIL:-ci-bot@foodmax.local}"
    - git config user.name "${CI_BOT_NAME:-FoodMax CI Bot}"
    - git remote set-url origin "https://oauth2:${CI_BOT_TOKEN}@bgs2026-ap-southeast-1.devops.alibabacloudcs.com/codeup/kos/dev-tools/foodmax-ai-config-init.git"
  script:
    - pnpm release
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /^chore\(release\): version packages/'
